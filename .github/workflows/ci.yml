name: CI

on:
  push:

env:
  RUBY_VERSION: '3.3.6'

jobs:
  ci:
    name: Ruby CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: RuboCop
        run: bundle exec rubocop

      - name: Bundler Audit
        run: bundle exec bundler-audit

      - name: RSpec
        run: bundle exec rspec
